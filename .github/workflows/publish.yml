name: 'publish'

on:
  push:
    branches:
      - release

# This workflow will trigger on each push to the `release` branch to create or update a GitHub release, build your app, and upload the artifacts to the release.

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          #          - platform: 'macos-latest' # for Arm based macs (M1 and above).
          #            args: '--target aarch64-apple-darwin'
          #          - platform: 'macos-latest' # for Intel based macs.
          #            args: '--target x86_64-apple-darwin'
          #          - platform: 'ubuntu-22.04'
          #            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup Bun
        uses: oven-sh/setup-bun@v2

      - name: install frontend dependencies
        run: bun install # change this to npm, pnpm or bun depending on which one you use.

      - name: get latest tag
        id: latesttag
        run: |
          $tag = git describe --tags --abbrev=0 2>$null
          if ($tag) {
            echo "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
        shell: pwsh

      - name: generate release notes
        id: releasenotes
        uses: mikepenz/release-changelog-builder-action@v6.2.2
        with:
          mode: 'COMMIT'
          fromTag: ${{ steps.latesttag.outputs.tag }}
          toTag: ${{ github.sha }}
          configurationJson: |
            {
              "categories": [
                { "title": "## Features", "labels": ["feat"] },
                { "title": "## Fixes", "labels": ["fix"] },
                { "title": "## Maintenance", "labels": ["build", "chore", "ci", "perf", "refactor", "update"] },
                { "title": "## Documentation", "labels": ["docs"] },
                { "title": "## Style", "labels": ["style"] }
              ],
              "label_extractor": [
                {
                  "pattern": "^([a-z]+)(\\(.+\\))?!?:",
                  "target": "$1",
                  "on_property": "title",
                  "method": "extract"
                }
              ],
              "template": "#{{CHANGELOG}}\n<details>\n<summary>Other</summary>\n\n#{{UNCATEGORIZED}}\n</details>",
              "empty_template": "- no changes"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: mesa-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: 'mesa v__VERSION__'
          releaseBody: ${{ steps.releasenotes.outputs.changelog }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
