<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css" />
  <link rel="stylesheet" href="/src/styles/styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mesa</title>
  <script type="module" src="/src/main.ts" defer></script>
</head>

<body>
  <div class="titlebar">
    <div class="menu-bar">
      <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle sidebar">
        <i class="ph ph-tray-arrow-down"></i>
        <i class="ph ph-tray-arrow-up"></i>
      </button>
      <div class="menu">
        <button class="menu-trigger">File</button>
        <div class="dropdown">
          <button class="menu-entry">Log Out</button>
          <button class="menu-entry">Show DevTools</button>
          <div class="divider"></div>
          <span id="app-version" class="menu-entry text">mesa</span>
        </div>
      </div>
      <div class="menu">
        <button class="menu-trigger">Edit</button>
        <div class="dropdown">
          <button class="menu-entry">Undo</button>
          <button class="menu-entry">Redo</button>
          <div class="divider"></div>
          <button class="menu-entry">Cut</button>
          <button class="menu-entry">Copy</button>
          <button class="menu-entry">Paste</button>
          <button class="menu-entry">Delete</button>
          <div class="divider"></div>
          <button class="menu-entry">Select All</button>
        </div>
      </div>
      <div class="menu">
        <button class="menu-trigger">View</button>
        <div class="dropdown">
          <div class="menu-entry inline">
            <div class="inline-text">Interface Zoom</div>
            <div class="inline-controls">
              <button class="icon-btn" title="zoom out"><i class="ph-bold ph-minus"></i></button>
              <div class="zoom-value">100%</div>
              <button class="icon-btn" title="zoom in"><i class="ph-bold ph-plus"></i></button>
            </div>
          </div>
          <div class="menu-entry inline">
            <div class="inline-text">Theme</div>
            <div class="inline-controls">
              <button class="theme-btn selected" title="light">
                <div class="radio-circle"></div>
              </button>
              <button class="theme-btn" title="dark">
                <div class="radio-circle"></div>
              </button>
              <button class="theme-btn" title="system">
                <div class="radio-circle"></div>
              </button>
            </div>
          </div>
          <button class="menu-entry">
            <div class="inline-text">Backdrop Blur</div>
            <i class="ph-bold ph-check check-icon"></i>
          </button>
          <div class="divider"></div>
          <button class="menu-entry">
            <div class="inline-text">Hide Window Controls</div>
            <i class="ph-bold ph-check check-icon"></i>
          </button>
        </div>
      </div>
    </div>
    <div class="title" data-tauri-drag-region>mesa</div>
    <div class="controls">

    </div>
  </div>
</body>
